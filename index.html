<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TINZZ MODE SOLO</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top, #00bfff 0%, blue 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

  .card {
  background: rgba(20, 20, 20, 0.8);
  border-radius: 25px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    10px 10px 25px rgba(0, 0, 0, 0.8),
    -8px -8px 20px rgba(255, 255, 255, 0.03),
    0 0 25px rgba(0, 255, 255, 0.05);
  backdrop-filter: blur(18px);
  width: 450px;
  padding: 40px;
  padding-bottom: 120px; /* INI YANG KAMU TAMBAHKAN */
  text-align: center;
  position: relative;
  overflow: hidden;
  height: 690px;
}

    .card:hover {
      transform: translateY(-5px);
    }

    .card::before {
      content: "";
      position: absolute;
      top: -100px;
      right: -80px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, black(0, 255, 255, 0.3), transparent 70%);
      filter: blur(60px);
      border-radius: 50%;
      opacity: 0.6;
    }

    .logo {
      width: 130px; /* logo diperbesar */
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 22px auto;
      border: 2px solid blue(0, 255, 255, 0.4);
      box-shadow: 0 0 20px blue(0, 255, 255, 0.2);
      outline: 1px solid black; /* ✅ stroke tipis warna hitam */
      outline-offset: 1px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .name {
      font-size: 1.6em;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-shadow: 0 0 10px blue(0, 255, 255, 0.6);
    }

    .verified-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 5px #00bfff);
    }

    .role {
  position: absolute;
  bottom: 20px;      /* jarak dari bawah */
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.9em;
  color: #aaa;
}

    .divider {
      width: 60%;
      height: 1px;
      background: (0, 255, 255, 0.25);
      margin: 18px auto;
    }

    .desc {
  position: relative;
  top: -25px;   /* sebelumnya -10px, sekarang lebih naik */
  font-size: 1em;
  color: #d9faff;
  margin-top: 16px;
  line-height: 1.6em;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 80%;
  max-width: 270px;
  height: 45px;
  margin-top: 22px;
  padding: 0 20px;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1em;
  text-decoration: none;
  transition: all 0.35s ease;
  box-shadow:
    inset 0 0 10px rgba(255, 255, 255, 0.1),
    0 0 10px rgba(0, 255, 255, 0.1);
  letter-spacing: 0.3px;

  /* TAMBAHAN UNTUK NAIKKAN SEMUA TOMBOL */
  position: relative;
  top: -25px;
}

    .btn svg {
      width: 24px;
      height: 24px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .whatsapp-btn {
      background: linear-gradient(135deg, #00ff95, #00b76a);
      box-shadow: 0 0 15px rgba(0, 255, 149, 0.3);
    }

    .whatsapp-btn:hover {
      background: linear-gradient(135deg, #00ffaa, #00c882);
      box-shadow: 0 0 30px rgba(0, 255, 149, 0.6);
    }

    .telegram-btn {
      background: linear-gradient(135deg, #00bfff, #007acc);
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
    }

    .telegram-btn:hover {
      background: linear-gradient(135deg, #33ccff, #0099ff);
      box-shadow: 0 0 30px rgba(0, 191, 255, 0.6);
    }

    .tiktok-btn {
      background: linear-gradient(135deg, black, #000);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .tiktok-btn:hover {
      background: linear-gradient(135deg, #000, #1a1a1a);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
    }

    .youtube-btn {
      background: linear-gradient(135deg, #ff0044, #cc0000);
      box-shadow: 0 0 15px rgba(255, 0, 68, 0.3);
    }

    .youtube-btn:hover {
      background: linear-gradient(135deg, #ff3366, #cc0022);
      box-shadow: 0 0 30px rgba(255, 51, 102, 0.6);
    }

/* ================= LOADING SCREEN ================= */

#loading-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #00bfff 0%, blue 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 6px solid rgba(255,255,255,0.2);
  border-top: 6px solid #00ffff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 1.2em;
  letter-spacing: 2px;
}

.dots::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

/* ================= WELCOME SCREEN ================= */

#welcome-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #00bfff 0%, blue 100%);
  display: flex;
  align-items: center;
  justify-content: flex-start; /* kiri */
  padding-left: 35px;
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
}

#typing-text {
  font-size: 2.3em;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 15px rgba(0,255,255,0.6);
}

/* Dashboard animation modern */
.card {
  opacity: 0;
  transform: translateY(40px) scale(0.97);
  filter: blur(10px);
  transition:
    opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1),
    transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
    filter 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

    @media print {
      body {
        background: black;
        color: black;
      }
      .card {
        background: none;
        border: 1px solid #999;
        box-shadow: none;
      }
    }
  </style>
</head>

<script>
  const loadingScreen = document.getElementById("loading-screen");
  const welcomeScreen = document.getElementById("welcome-screen");
  const typingText = document.getElementById("typing-text");
  const dashboard = document.querySelector(".card");

  const text = "It’s a pleasure to welcome you.";
  let index = 0;

  function typeEffect() {
    if (index < text.length) {
      typingText.textContent += text.charAt(index);
      index++;
      setTimeout(typeEffect, 70);
    } else {
      setTimeout(() => {
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.style.display = "none";
          dashboard.classList.add("show");
        }, 800);
      }, 1200);
    }
  }

  // Loading 3 detik
  setTimeout(() => {
    loadingScreen.style.opacity = "0";
    setTimeout(() => {
      loadingScreen.style.display = "none";
      welcomeScreen.style.opacity = "1";
      welcomeScreen.style.pointerEvents = "auto";
      typeEffect();
    }, 800);
  }, 3000);
</script>
